<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - PC Builder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f4f4f4; 
            min-height: 100vh; 
            color: #1a1a2e; 
        }
        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 30px 20px; 
        }
        .card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 30px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .card h2 { 
            color: #00d4aa; 
            margin-bottom: 25px; 
        }
        
        /* === ПРОФИЛЬ ХЕДЕР === */
        .profile-header { 
            display: flex; 
            align-items: center; 
            gap: 25px; 
            margin-bottom: 30px; 
            padding-bottom: 25px; 
            border-bottom: 2px solid #eee; 
        }
        
        /* === АВАТАР === */
        .avatar-section { 
            text-align: center; 
            flex-shrink: 0;
        }
        .avatar-preview { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 4px solid #00d4aa; 
            margin: 0 auto 12px; 
            background: #f0f0f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 48px; 
            font-weight: bold; 
            color: #666; 
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }
        .avatar-preview:hover { 
            transform: scale(1.05); 
            border-color: #00b894;
            box-shadow: 0 6px 20px rgba(0,212,170,0.3);
        }
        .avatar-preview img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
            font-size: 48px;
            background: #00d4aa;
        }
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .avatar-preview:hover .avatar-overlay {
            opacity: 1;
        }
        .avatar-upload { 
            font-size: 13px; 
            color: #00d4aa; 
            cursor: pointer;
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid #00d4aa;
            border-radius: 6px;
            transition: all 0.2s;
            margin-right: 8px;
        }
        .avatar-upload:hover {
            background: #00d4aa;
            color: #fff;
        }
        .avatar-upload input { 
            display: none; 
        }
        
        /* 🔥 КНОПКА СБРОСА АВАТАРА */
        .avatar-reset { 
            font-size: 13px; 
            color: #666; 
            background: #f0f0f0; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            padding: 6px 14px; 
            cursor: pointer; 
            display: inline-block; 
            margin-top: 8px; 
            transition: all 0.2s;
        }
        .avatar-reset:hover {
            background: #e0e0e0;
            color: #cc0000;
            border-color: #cc0000;
        }
        .avatar-reset:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* === ИНФО О ПОЛЬЗОВАТЕЛЕ === */
        .user-info h3 { 
            font-size: 26px; 
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .role-badge { 
            display: inline-block; 
            padding: 5px 16px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 700; 
            background: #00d4aa20; 
            color: #00d4aa; 
            border: 1px solid #00d4aa; 
        }
        .user-meta {
            margin-top: 12px;
            font-size: 13px;
            color: #888;
        }
        
        /* === ФОРМА === */
        .form-group { 
            margin-bottom: 22px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #555; 
            font-weight: 600; 
        }
        .form-group input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 15px; 
            transition: all 0.2s;
            background: #fafafa;
        }
        .form-group input:focus { 
            outline: none; 
            border-color: #00d4aa; 
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
        }
        .form-group input:disabled {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }
        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        /* === КНОПКИ === */
        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 30px; 
            flex-wrap: wrap; 
        }
        .btn { 
            padding: 12px 28px; 
            border: none; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .btn-primary { 
            background: #00d4aa; 
            color: #1a1a2e; 
        }
        .btn-primary:hover { 
            background: #00b894; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,212,170,0.3);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary { 
            background: #6c757d; 
            color: #fff; 
        }
        .btn-secondary:hover { 
            background: #5a6268; 
        }
        
        /* === СООБЩЕНИЯ === */
        .error { 
            color: #ff6b6b; 
            font-size: 14px; 
            margin-top: 8px; 
            display: none; 
            padding: 8px 12px;
            background: #ff6b6b15;
            border-radius: 6px;
        }
        .success { 
            color: #00d4aa; 
            font-size: 14px; 
            margin-top: 8px; 
            display: none; 
            padding: 8px 12px;
            background: #00d4aa15;
            border-radius: 6px;
        }
        .back-link { 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            color: #00d4aa; 
            text-decoration: none; 
            margin-bottom: 20px; 
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .back-link:hover { 
            opacity: 0.8; 
        }
        .nickname-color {
            font-weight: 700;
        }
        
        @media (max-width: 600px) { 
            .form-row { grid-template-columns: 1fr; } 
            .profile-header { flex-direction: column; text-align: center; } 
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    
    <div class="card">
        <h2>⚙️ Редактирование профиля</h2>
        
        <div class="profile-header">
            <div class="avatar-section">
                <!-- Аватар с сервера -->
                <label class="avatar-preview" id="avatarPreview" title="Нажмите для загрузки">
                    <span id="avatarPlaceholder" class="avatar-placeholder">?</span>
                    <img id="avatarImage" src="" alt="Avatar" style="display:none">
                    <div class="avatar-overlay">📷 Изменить</div>
                </label>
                <label class="avatar-upload">
                    📷 Загрузить фото
                    <input type="file" id="avatarInput" accept="image/*">
                </label>
                
                <!-- 🔥 КНОПКА СБРОСА АВАТАРА -->
                <button type="button" class="avatar-reset" id="resetAvatarBtn" onclick="resetAvatar()">
                    🔄 Сбросить к стандартному
                </button>
                
                <p style="font-size:12px;color:#888;margin-top:8px">Макс. 5 МБ (JPG, PNG)</p>
            </div>
            <div class="user-info">
                <h3><span class="nickname-color" id="displayName" style="color:#00d4aa">Загрузка...</span></h3>
                <span class="role-badge" id="roleBadge">Пользователь</span>
                <div class="user-meta">
                    Логин: <strong id="displayUsername">...</strong>
                </div>
            </div>
        </div>
        
        <form id="profileForm" onsubmit="handleProfileUpdate(event)">
            <div class="form-group">
                <label for="nickname">Никнейм *</label>
                <input type="text" id="nickname" name="nickname" required minlength="3" maxlength="30" placeholder="Ваш отображаемый ник">
                <div class="error" id="nicknameError"></div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.ru">
                    <div class="error" id="emailError"></div>
                </div>
                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00">
                    <div class="error" id="phoneError"></div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="currentPassword">Текущий пароль (для подтверждения изменений)</label>
                <input type="password" id="currentPassword" name="currentPassword" autocomplete="current-password" placeholder="••••••••">
                <div class="error" id="passwordError"></div>
            </div>
            
            <div class="success" id="successMessage">✅ Профиль обновлён!</div>
            <div class="error" id="globalError"></div>
            
            <div class="btn-group">
                <button type="submit" class="btn btn-primary" id="saveBtn">💾 Сохранить изменения</button>
                <button type="button" class="btn btn-secondary" onclick="location.href='index.html'">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script src="auth.js"></script>
<script>
// === ПРОВЕРКА АВТОРИЗАЦИИ ===
if (!requireAuth()) {
    // Перенаправление обрабатывается в requireAuth()
}

let currentProfile = null;
let avatarFile = null;
let avatarPreviewUrl = null;

// === ЗАГРУЗКА ПРОФИЛЯ ===
async function loadProfile() {
    const username = getCurrentUsername();
    if (!username) { 
        location.href = 'login.html'; 
        return; 
    }
    
    currentProfile = await fetchProfile(username);
    
    if (!currentProfile) {
        document.getElementById('displayName').textContent = 'Ошибка загрузки';
        document.getElementById('displayUsername').textContent = username;
        return;
    }
    
    // Заполнение формы
    document.getElementById('nickname').value = currentProfile.nickname || username;
    document.getElementById('email').value = currentProfile.email || currentProfile.user_email || '';
    document.getElementById('phone').value = currentProfile.phone || currentProfile.user_phone || '';
    
    // Отображение имён
    const displayName = currentProfile.nickname || currentProfile.user_name || username;
    document.getElementById('displayName').textContent = displayName;
    document.getElementById('displayUsername').textContent = username;
    
    // Цвет ника по роли
    const roleId = currentProfile.role || 1;
    const roleConfig = ROLES_CONFIG[roleId] || ROLES_CONFIG[1];
    document.getElementById('displayName').style.color = roleConfig.color;
    document.getElementById('roleBadge').textContent = roleConfig.name;
    document.getElementById('roleBadge').style.color = roleConfig.color;
    document.getElementById('roleBadge').style.borderColor = roleConfig.color;
    document.getElementById('roleBadge').style.background = roleConfig.color + '20';
    
    // === 🔥 ЗАГРУЗКА АВАТАРА С ВЕРСИЕЙ (БЕЗ КЭША) ===
    const avatarImage = document.getElementById('avatarImage');
    const avatarPlaceholder = document.getElementById('avatarPlaceholder');
    const rawAvatarUrl = currentProfile.avatar_url || currentProfile.user_img;
    
    // 🔥 Строим URL с timestamp
    const avatarUrl = buildAvatarUrl(rawAvatarUrl);
    
    console.log('🖼️ Profile Avatar URL:', avatarUrl);  // Для отладки
    
    if (avatarUrl) {
        // Предзагрузка через новый объект Image
        const img = new Image();
        img.onload = () => {
            avatarImage.src = avatarUrl;  // URL с timestamp
            avatarImage.style.display = 'block';
            avatarPlaceholder.style.display = 'none';
            console.log('✅ Аватар загружен успешно');
        };
        img.onerror = () => {
            console.error('❌ Не удалось загрузить аватар:', avatarUrl);
            avatarImage.style.display = 'none';
            avatarPlaceholder.style.display = 'flex';
            avatarPlaceholder.textContent = displayName.charAt(0).toUpperCase();
            avatarPlaceholder.style.background = roleConfig.color;
        };
        img.src = avatarUrl;
    } else {
        avatarPlaceholder.textContent = displayName.charAt(0).toUpperCase();
        avatarPlaceholder.style.background = roleConfig.color;
        avatarPlaceholder.style.display = 'flex';
        avatarImage.style.display = 'none';
    }
}

// === ПРЕДПРОСМОТР АВАТАРА ===
document.getElementById('avatarInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    // Проверка типа файла
    if (!file.type.startsWith('image/')) {
        alert('❌ Пожалуйста, выберите изображение (JPG, PNG)');
        this.value = '';
        return;
    }
    
    // Проверка размера (5 МБ)
    if (file.size > 5 * 1024 * 1024) {
        alert('❌ Максимальный размер файла — 5 МБ');
        this.value = '';
        return;
    }
    
    avatarFile = file;
    
    // Предпросмотр
    const reader = new FileReader();
    reader.onload = function(e) {
        avatarPreviewUrl = e.target.result;
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');
        
        avatarImage.src = avatarPreviewUrl;
        avatarImage.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
    
    console.log('✅ Аватар выбран:', file.name, `(${(file.size/1024).toFixed(1)} KB)`);
});

// === ПРОВЕРКА НИКНЕЙМА НА ЗАНЯТОСТЬ ===
document.getElementById('nickname').addEventListener('blur', async function() {
    const nickname = this.value.trim();
    const originalNickname = currentProfile?.nickname || getCurrentUsername();
    
    if (!nickname || nickname === originalNickname) return;
    
    try {
        const res = await fetch(`${API_BASE}/api/check-username?username=${encodeURIComponent(nickname)}`);
        const data = await res.json();
        const errorEl = document.getElementById('nicknameError');
        
        if (!data.available) {
            errorEl.textContent = '⚠️ Этот никнейм уже занят';
            errorEl.style.display = 'block';
            this.style.borderColor = '#ff6b6b';
        } else {
            errorEl.style.display = 'none';
            this.style.borderColor = '#ddd';
        }
    } catch(e) {
        console.warn('Не удалось проверить никнейм', e);
    }
});

// === 🔥 СБРОС АВАТАРА К СТАНДАРТНОМУ ===
async function resetAvatar() {
    const username = getCurrentUsername();
    if (!username) return;
    
    const resetBtn = document.getElementById('resetAvatarBtn');
    const originalText = resetBtn.textContent;
    
    // Подтверждение
    if (!confirm('🔄 Сбросить аватар к стандартному?\n\nВаше текущее фото будет заменено на аватар, сгенерированный из ника.')) {
        return;
    }
    
    // Блокируем кнопку
    resetBtn.disabled = true;
    resetBtn.textContent = '⏳ Сброс...';
    
    try {
        // Вызываем эндпоинт сброса на сервере
        const response = await fetch(`${API_BASE}/data/profile/${username}/avatar/reset`, {
            method: 'POST',
            headers: { 
                'Authorization': `Bearer ${getToken()}`,
                'Content-Type': 'application/json'
            }
        });
        
        let data = {};
        try { data = await response.json(); } catch(e) {}
        
        if (!response.ok) {
            throw new Error(data.detail || data.error || 'Ошибка сброса аватара');
        }
        
        // ✅ Успех: обновляем отображение аватара
        const displayName = currentProfile?.nickname || username;
        const roleId = currentProfile?.role || 1;
        const roleConfig = ROLES_CONFIG[roleId] || ROLES_CONFIG[1];
        
        // Показываем заглушку с первой буквой (стандартный аватар)
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');
        
        avatarPlaceholder.textContent = displayName.charAt(0).toUpperCase();
        avatarPlaceholder.style.background = roleConfig.color;
        avatarPlaceholder.style.display = 'flex';
        avatarImage.style.display = 'none';
        
        // Сбрасываем переменные
        avatarFile = null;
        avatarPreviewUrl = null;
        document.getElementById('avatarInput').value = '';
        
        // Показываем сообщение
        alert('✅ Аватар сброшен к стандартному!');
        
        // Обновляем профиль в памяти
        if (currentProfile) {
            currentProfile.avatar_url = data.avatar_url || `/data/images/avatars/${username}_avatar.png`;
            currentProfile.user_img = currentProfile.avatar_url;
        }
        
    } catch (err) {
        console.error('Ошибка сброса аватара:', err);
        alert('❌ Не удалось сбросить аватар: ' + (err.message || 'Ошибка'));
    } finally {
        // Разблокируем кнопку
        resetBtn.disabled = false;
        resetBtn.textContent = originalText;
    }
}

// === СОХРАНЕНИЕ ПРОФИЛЯ ===
async function handleProfileUpdate(event) {
    event.preventDefault();
    
    const nickname = document.getElementById('nickname').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const currentPassword = document.getElementById('currentPassword').value;
    
    const saveBtn = document.getElementById('saveBtn');
    const globalError = document.getElementById('globalError');
    const successMsg = document.getElementById('successMessage');
    
    // Сброс сообщений
    globalError.style.display = 'none';
    successMsg.style.display = 'none';
    document.querySelectorAll('.error').forEach(el => { 
        el.textContent = ''; 
        el.style.display = 'none'; 
    });
    
    // Валидация
    if (nickname.length < 3) {
        document.getElementById('nicknameError').textContent = '⚠️ Минимум 3 символа';
        document.getElementById('nicknameError').style.display = 'block';
        return;
    }
    
    // Блокируем кнопку
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Сохранение...';
    
    try {
        const username = getCurrentUsername();
        
        // === ОТПРАВКА НА СЕРВЕР ===
        if (avatarFile) {
            // 🔥 С аватаром: отправляем ТОЛЬКО файл (отдельный запрос)
            console.log('📤 Отправка аватара...');
            const formData = new FormData();
            formData.append('file', avatarFile);  // 🔥 ИСПРАВЛЕНО: 'file' вместо 'avatar'
            
            const response = await fetch(`${window.API_BASE}/data/profile/${username}/avatar`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${getToken()}` 
                    // 🔥 НЕ добавляйте Content-Type для FormData!
                },
                body: formData
            });
            
            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.detail || 'Ошибка загрузки аватара');
            }
            
            console.log('✅ Аватар загружен:', result);
            
            // После успешной загрузки аватара — обновляем профиль (отдельный запрос)
            const payload = { 
                nickname, 
                email: email || null, 
                phone: phone || null 
            };
            
            const profileResponse = await fetch(`${window.API_BASE}/profile/me`, {
                method: 'PUT',
                headers: { 
                    'Authorization': `Bearer ${getToken()}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(payload)
            });
            
            if (!profileResponse.ok) {
                const err = await profileResponse.json();
                throw new Error(err.detail || 'Ошибка обновления профиля');
            }
            
        } else {
            // 🔥 Без аватара: обновляем только профиль
            console.log('📤 Отправка данных профиля...');
            const payload = { 
                nickname, 
                email: email || null, 
                phone: phone || null 
            };
            
            const response = await fetch(`${window.API_BASE}/profile/me`, {
                method: 'PUT',
                headers: { 
                    'Authorization': `Bearer ${getToken()}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || 'Ошибка обновления');
            }
        }
        
        // === УСПЕХ ===
        successMsg.style.display = 'block';
        
        // Если сменился ник — обновляем куки
        if (nickname !== getCurrentUsername()) { 
            setCookie(USERNAME_KEY, nickname, 7); 
        }
        
        // Обновляем отображение
        document.getElementById('displayName').textContent = nickname;
        
        // Сброс формы
        avatarFile = null;
        document.getElementById('avatarInput').value = '';
        document.getElementById('currentPassword').value = '';
        
        // Перезагрузка для обновления шапки
        setTimeout(() => { location.reload(); }, 1500);
        
    } catch (err) {
        console.error('Ошибка обновления:', err);
        globalError.textContent = err.message || 'Не удалось сохранить';
        globalError.style.display = 'block';
    } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Сохранить изменения';
    }
}
async function uploadAvatar(fileInput) {
    const file = fileInput.files[0];
    if (!file) {
        alert('Выберите файл!');
        return;
    }
    
    console.log('📤 Загрузка файла:', file.name, file.size, 'bytes');
    
    const username = getCurrentUsername();
    const token = getToken();
    
    // 🔥 Создаём FormData
    const formData = new FormData();
    formData.append('file', file);  // 🔥 Имя поля должно быть "file"
    
    try {
        console.log('📡 Отправка на:', `${window.API_BASE}/data/profile/${username}/avatar`);
        
        const response = await fetch(`${window.API_BASE}/data/profile/${username}/avatar`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
                // 🔥 НЕ добавляйте Content-Type для FormData!
            },
            body: formData
        });
        
        const result = await response.json();
        console.log('📦 Ответ сервера:', result);
        
        if (!response.ok) {
            throw new Error(result.detail || 'Ошибка загрузки');
        }
        
        alert('✅ Аватар загружен!');
        location.reload();
        
    } catch (error) {
        console.error('❌ Ошибка:', error);
        alert('Ошибка: ' + error.message);
    }
}
// === ИНИЦИАЛИЗАЦИЯ ===
document.addEventListener('DOMContentLoaded', async () => {
    // 🔥 ПРОВЕРКА АВТОРИЗАЦИИ ПЕРЕД ВСЕМ
    if (!isAuthenticated()) {
        console.warn('⚠️ Пользователь не авторизован, редирект на login.html');
        window.location.href = 'login.html';
        return;
    }
    
    // Загрузка профиля
    try {
        const username = getCurrentUsername();
        if (!username) {
            throw new Error('Имя пользователя не найдено');
        }
        
        currentUser = await fetchProfile(username);
        
        if (!currentUser || currentUser.role < 2) {
            document.body.innerHTML = '<h1 style="text-align:center;color:red;margin-top:50px;">❌ Доступ запрещён</h1>';
            return;
        }
        
        // ... остальной код инициализации ...
        
    } catch (error) {
        console.error('❌ Ошибка инициализации:', error);
        // При ошибке тоже редиректим на login
        window.location.href = 'login.html';
    }
});
</script>
