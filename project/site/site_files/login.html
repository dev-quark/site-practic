<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - PC Builder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #fff; 
        }
        .auth-container { 
            background: #1f1f2e; 
            padding: 40px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
        }
        .auth-container h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #00d4aa; 
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #aaa; 
        }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #333; 
            border-radius: 6px; 
            background: #2a2a3e; 
            color: #fff; 
            font-size: 16px; 
        }
        .form-group input:focus { 
            outline: none; 
            border-color: #00d4aa; 
        }
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: #00d4aa; 
            color: #1a1a2e; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: background 0.2s;
        }
        .btn:hover { background: #00b894; }
        .btn:disabled { background: #555; cursor: not-allowed; opacity: 0.7; }
        .links { 
            text-align: center; 
            margin-top: 20px; 
            color: #aaa; 
            font-size: 14px; 
        }
        .links a { 
            color: #00d4aa; 
            text-decoration: none; 
        }
        .links a:hover { text-decoration: underline; }
        .error { 
            color: #ff6b6b; 
            font-size: 14px; 
            margin-top: 10px; 
            text-align: center; 
            min-height: 20px; 
            display: none; 
        }
        .success { 
            color: #00d4aa; 
            font-size: 14px; 
            margin-top: 10px; 
            text-align: center; 
            display: none; 
        }
    </style>
</head>
<body>
<div class="auth-container">
    <h2>🔐 Вход в аккаунт</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" placeholder="Введите логин" autocomplete="username" required minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" autocomplete="current-password" required minlength="6">
        </div>
        <button type="submit" class="btn" id="loginBtn">Войти</button>
        <p class="error" id="errorMessage"></p>
        <p class="success" id="successMessage"></p>
    </form>
    <div class="links">
        <a href="index.html">← На главную</a> | 
        <a href="register.html">Нет аккаунта? Регистрация</a>
    </div>
</div>

<script src="auth.js"></script>
<script>
// === ЛОКАЛЬНЫЕ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (на случай если auth.js не загрузился) ===
function safeSetCookie(name, value, days) {
    if (typeof setCookie === 'function') {
        setCookie(name, value, days);
    } else {
        // Фоллбэк: простые куки
        const expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
    }
}

function safeIsAuthenticated() {
    if (typeof isAuthenticated === 'function') {
        return isAuthenticated();
    }
    // Фоллбэк: проверка куки вручную
    return document.cookie.includes('pcbuilder_auth') && document.cookie.includes('pcbuilder_username');
}

function clearMessages(...ids) {
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.textContent = '';
            el.style.display = 'none';
        }
    });
}

function showError(msg) {
    const el = document.getElementById('errorMessage');
    const successEl = document.getElementById('successMessage');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
    if (successEl) successEl.style.display = 'none';
}

function showSuccess(msg) {
    const el = document.getElementById('successMessage');
    const errorEl = document.getElementById('errorMessage');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
    if (errorEl) errorEl.style.display = 'none';
}

// === ОБРАБОТКА ВХОДА ===
async function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    
    // Валидация
    if (username.length < 3) { showError('⚠️ Логин минимум 3 символа'); return; }
    if (password.length < 6) { showError('⚠️ Пароль минимум 6 символов'); return; }
    
    // Сброс сообщений
    clearMessages('errorMessage', 'successMessage');
    loginBtn.disabled = true;
    loginBtn.textContent = 'Вход...';
    
    try {
        // Проверка API_BASE
        const apiBase = typeof API_BASE !== 'undefined' ? API_BASE : 'http://127.0.0.1:8001';
        
        const response = await fetch(`${apiBase}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        let data = {};
        try { data = await response.json(); } catch(e) {}
        
        if (!response.ok) {
            throw new Error(data.detail || data.error || `Ошибка ${response.status}`);
        }
        
        // Сохранение токена
        safeSetCookie('pcbuilder_auth', data.token, 7);
        safeSetCookie('pcbuilder_username', username, 7);
        
        showSuccess('✅ Успешный вход!');
        
        // Перенаправление
        const returnUrl = new URLSearchParams(location.search).get('return') || 'index.html';
        setTimeout(() => { 
            location.replace(returnUrl); 
        }, 800);
        
    } catch (err) {
        console.error('Login error:', err);
        showError(err.message || 'Не удалось войти');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
    }
}

// === ИНИЦИАЛИЗАЦИЯ ===
function initLogin() {
    // Проверка авторизации (только если функции доступны)
    if (safeIsAuthenticated()) {
        location.replace('index.html');
        return;
    }
    
    // Фокус на поле ввода
    const input = document.getElementById('username');
    if (input) input.focus();
}

// Запуск после загрузки DOM
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initLogin);
} else {
    initLogin();
}
</script>
</body>
</html>
